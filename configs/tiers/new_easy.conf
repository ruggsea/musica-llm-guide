# New models gap analysis -- easy wins on 1 node
# Format: model_id|dtype|tp|extra_args
# All models need to be downloaded first (not cached)
TIER_NAME="new_easy"
TIER_GPUS=4
MODELS=(
# GPT-OSS-20B: 21.5B MoE, ships MXFP4, Apache 2.0 (OpenAI)
# Memory: ~14GB MXFP4, trivially fits 1 GPU
"openai/gpt-oss-20b|auto|1|"
# GPT-OSS-120B: 120B MoE, ships MXFP4, Apache 2.0 (OpenAI)
# Memory: ~63GB MXFP4, fits 1 H100 94GB
"openai/gpt-oss-120b|auto|1|"
# Seed-OSS-36B: 36B dense, BF16, Apache 2.0 (ByteDance)
# Memory: 36*2*1.15 = 82.8GB, TP=2 -> 41.4 GB/GPU
"ByteDance-Seed/Seed-OSS-36B-Instruct|bfloat16|2|"
# GLM-4.7-Flash: 30B MoE (3.6B active), BF16, MIT (Z.ai)
# Memory: ~60GB BF16, fits TP=2 (30 GB/GPU) or even TP=1
"zai-org/GLM-4.7-Flash|bfloat16|2|--trust-remote-code"
)
