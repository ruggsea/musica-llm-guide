# MiniMax-M2.5 -- single node TP=4
# 228.7B MoE params, ships FP8, ~220 GB for weights
# Following vLLM recipe: https://docs.vllm.ai/projects/recipes/en/latest/MiniMax/MiniMax-M2.html
# TP=4 on 4x H100 94GB: ~55 GB/GPU for weights
# Needs --trust-remote-code (custom architecture: minimax_m2)
MODEL_ID="MiniMaxAI/MiniMax-M2.5"
SERVED_NAME="minimax-m2.5"
DTYPE="auto"
TP=4
MAX_MODEL_LEN=4096
MAX_NUM_SEQS=16
GPU_MEMORY_UTIL=0.90
EXTRA_ARGS="--tool-call-parser minimax_m2 --reasoning-parser minimax_m2_append_think --enable-auto-tool-choice"
TRUST_REMOTE_CODE=true
