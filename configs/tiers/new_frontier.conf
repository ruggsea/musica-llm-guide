# New models gap analysis -- frontier 1-node models (4 GPUs)
# These are FP8 MoE models that may need FlashInfer CUTLASS .so
# Format: model_id|dtype|tp|extra_args
TIER_NAME="new_frontier"
TIER_GPUS=4
MODELS=(
# Step-3.5-Flash: 199B MoE (11B active), BF16, Apache 2.0 (StepFun)
# Memory: BF16 199*2*1.15 = 458GB total -> TP=4: 114 GB/GPU -- TOO BIG for BF16!
# FP8 variant: 199*1*1.15 = 229GB -> TP=4: 57.3 GB/GPU -- FITS
# vLLM recipe: "FP8 cannot use TP4, use DP4+EP instead" -- but for basic load test try TP=4
# Needs --trust-remote-code (custom step3p5 architecture)
"stepfun-ai/Step-3.5-Flash|auto|4|--trust-remote-code"
# Kimi-K2.5: 171B multimodal (ships compressed-tensors FP8), Moonshot
# Memory: 171*1*1.15 = 197GB -> TP=4: 49.2 GB/GPU -- FITS easily
# Needs --trust-remote-code (custom kimi_k25 architecture)
"moonshotai/Kimi-K2.5|auto|4|--trust-remote-code"
# MiniMax-M2.5 retry: 229B MoE, FP8, TP=4
# Memory: 229*1*1.15 = 263GB -> TP=4: 65.8 GB/GPU
"MiniMaxAI/MiniMax-M2.5|auto|4|--trust-remote-code --enable-auto-tool-choice --tool-call-parser minimax_m2 --reasoning-parser minimax_m2_append_think"
)
