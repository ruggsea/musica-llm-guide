# =============================================================================
# GPU Memory Calculations for Open-Source LLMs on 4x NVIDIA H100 80GB
# =============================================================================
# Cluster Node Specification:
#   - 4x NVIDIA H100 80GB SXM (HBM3)
#   - Per-GPU memory: 80 GB (81,920 MB)
#   - Total GPU memory: 320 GB (327,680 MB)
#   - Inter-GPU: NVLink 4.0 (900 GB/s bidirectional)
#   - Tensor parallelism degree: up to 4
#
# Memory Formula:
#   Raw model memory = num_parameters * bytes_per_parameter
#   Effective memory = Raw model memory * (1 + overhead_fraction)
#   overhead_fraction = 0.15 (15% for KV cache, activations, CUDA context, etc.)
#
# Precision Bytes:
#   FP32  = 4 bytes/param
#   FP16  = 2 bytes/param (also BF16)
#   INT8  = 1 byte/param  (GPTQ-8bit, bitsandbytes-8bit, SmoothQuant)
#   INT4  = 0.5 bytes/param (GPTQ-4bit, AWQ, bitsandbytes-4bit, GGUF Q4)
# =============================================================================

hardware:
  gpu_model: "NVIDIA H100 80GB SXM5"
  gpu_memory_gb: 80
  num_gpus: 4
  total_memory_gb: 320
  interconnect: "NVLink 4.0 (900 GB/s bidirectional)"
  tensor_parallel_max: 4
  overhead_fraction: 0.15  # 15% overhead for KV cache, activations, CUDA kernels

# =============================================================================
# SECTION 1: Raw Memory Calculations by Model Size
# =============================================================================
# Formula: memory_gb = (params_billions * bytes_per_param * 1.15) / 1.0
#   where 1.15 accounts for 15% overhead
#
# Note: 1 billion parameters = 1e9 parameters
#   FP32: 1B params = 1e9 * 4 bytes = 4.00 GB raw, 4.60 GB with overhead
#   FP16: 1B params = 1e9 * 2 bytes = 2.00 GB raw, 2.30 GB with overhead
#   INT8: 1B params = 1e9 * 1 byte  = 1.00 GB raw, 1.15 GB with overhead
#   INT4: 1B params = 1e9 * 0.5 B   = 0.50 GB raw, 0.575 GB with overhead
# =============================================================================

memory_per_billion_params:
  FP32:
    raw_gb: 4.00
    with_15pct_overhead_gb: 4.60
  FP16_BF16:
    raw_gb: 2.00
    with_15pct_overhead_gb: 2.30
  INT8:
    raw_gb: 1.00
    with_15pct_overhead_gb: 1.15
  INT4:
    raw_gb: 0.50
    with_15pct_overhead_gb: 0.575

# =============================================================================
# SECTION 2: Detailed Per-Model Calculations
# =============================================================================

