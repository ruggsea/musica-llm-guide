  - name: "Llama 3.2 1B"
    parameters_B: 1.24
    architecture: "Dense Transformer"
    context_length: 131072
    memory:
      FP32:
        raw_gb: 4.96    # 1.24 * 4
        with_overhead_gb: 5.70   # 4.96 * 1.15
      FP16:
        raw_gb: 2.48    # 1.24 * 2
        with_overhead_gb: 2.85   # 2.48 * 1.15
      INT8:
        raw_gb: 1.24    # 1.24 * 1
        with_overhead_gb: 1.43   # 1.24 * 1.15
      INT4:
        raw_gb: 0.62    # 1.24 * 0.5
        with_overhead_gb: 0.71   # 0.62 * 1.15
    fits_on_4xH100:
      FP32: true   # 5.70 GB << 320 GB
      FP16: true   # 2.85 GB << 320 GB
      INT8: true   # 1.43 GB << 320 GB
      INT4: true   # 0.71 GB << 320 GB
    recommendation:
      max_precision: "FP32"
      tensor_parallelism_needed: false  # Fits on single GPU at any precision
      tp_degree: 1
      serving_framework: "vLLM or TGI"
      notes: >
        Extremely small model. Fits on a single GPU at FP32 with room to spare.
        No tensor parallelism needed. Ideal for high-throughput batch inference.
        With 131K context, KV cache can grow large -- for very long contexts,
        consider reserving extra memory (up to ~10-20 GB for full 131K context).

