# =============================================================================
# SECTION 4: Serving Framework Recommendations
# =============================================================================

serving_frameworks:
  vLLM:
    description: >
      Primary recommendation for most models. Best throughput via continuous
      batching and PagedAttention. Native support for tensor parallelism,
      GPTQ, AWQ, FP8, and MoE models.
    supported_quantizations:
      - "FP8 (H100 native)"
      - "GPTQ-4bit"
      - "GPTQ-8bit"
      - "AWQ-4bit"
      - "bitsandbytes (NF4, INT8)"
      - "SqueezeLLM"
    recommended_for:
      - "All dense models"
      - "MoE models (Mixtral, DeepSeek)"
      - "High-throughput batch serving"
      - "Long-context inference (PagedAttention)"
    tensor_parallelism: true
    pipeline_parallelism: true  # Added in recent versions
    max_tp: "limited by GPU count"
    launch_example: >
      python -m vllm.entrypoints.openai.api_server
        --model meta-llama/Llama-3.1-70B-Instruct
        --tensor-parallel-size 4
        --dtype bfloat16
        --max-model-len 32768
        --gpu-memory-utilization 0.90

  TGI:
    description: >
      HuggingFace Text Generation Inference. Good Docker-based deployment.
      Slightly lower throughput than vLLM but excellent for HF ecosystem.
    supported_quantizations:
      - "GPTQ-4bit"
      - "AWQ-4bit"
      - "EETQ (INT8)"
      - "bitsandbytes"
    recommended_for:
      - "HuggingFace ecosystem integration"
      - "Docker-based deployments"
      - "Streaming inference"
    tensor_parallelism: true
    launch_example: >
      docker run --gpus all
        ghcr.io/huggingface/text-generation-inference
        --model-id meta-llama/Llama-3.1-8B-Instruct
        --num-shard 4
        --dtype bfloat16

  SGLang:
    description: >
      Fast serving framework with RadixAttention for efficient prefix
      caching. Excellent for chat/multi-turn workloads. Strong MoE support.
    recommended_for:
      - "Multi-turn conversations (RadixAttention)"
      - "DeepSeek models (optimized support)"
      - "MoE models"
    tensor_parallelism: true
    launch_example: >
      python -m sglang.launch_server
        --model meta-llama/Llama-3.1-70B-Instruct
        --tp 4
        --dtype bfloat16

# =============================================================================
# SECTION 5: FP8 Considerations (H100 Native)
# =============================================================================
# The H100 natively supports FP8 (E4M3 and E5M2) computation.
# FP8 gives ~2x throughput improvement over BF16 while maintaining
# quality close to BF16 (much better than INT8 in practice).
#
# FP8 memory: parameters * 1 byte (same storage as INT8)
# But FP8 computation is done natively on H100 Tensor Cores, unlike INT8
# which may require dequantization overhead.
#
# For models where INT8 is the max precision on 4xH100, FP8 is typically
# preferred because:
#   1. Same memory footprint as INT8
#   2. Native H100 Tensor Core support (faster)
#   3. Better quality than INT8 (closer to BF16)
#   4. Supported by vLLM, TGI, and SGLang
# =============================================================================

fp8_notes:
  bytes_per_param: 1.0  # Same as INT8
  quality: "Near-BF16 quality, significantly better than INT8"
  hardware_support: "Native on H100 (Hopper architecture)"
  recommendation: >
    For any model where INT8 is recommended, prefer FP8 on H100.
    FP8 weights with BF16 activations is the ideal balance.
    vLLM supports --dtype float8 or loading FP8-quantized checkpoints.
  applicable_models:
    - "Mixtral 8x22B: FP8 TP=4 (same memory as INT8, better quality)"
    - "DeepSeek-V2: FP8 TP=4 (same memory as INT8, better quality)"
    - "Any 70B model: FP8 TP=2 instead of INT8 TP=2"

# =============================================================================
# SECTION 6: KV Cache Memory Estimation
# =============================================================================
# KV cache memory per token (approximate):
#   kv_cache_per_token = 2 * num_layers * num_kv_heads * head_dim * 2 (bytes, FP16)
#
# For Llama 3.1 70B (80 layers, 8 KV heads, head_dim=128):
#   = 2 * 80 * 8 * 128 * 2 = 327,680 bytes = 0.3125 MB per token
#   At 4K context: ~1.22 GB
#   At 32K context: ~9.77 GB
#   At 131K context: ~40.04 GB (!) -- THIS is why long context needs headroom
#
# For Llama 3.1 8B (32 layers, 8 KV heads, head_dim=128):
#   = 2 * 32 * 8 * 128 * 2 = 131,072 bytes = 0.125 MB per token
#   At 4K context: ~0.49 GB
#   At 32K context: ~3.91 GB
#   At 131K context: ~16.00 GB
#
# For DeepSeek-V3 (MLA compresses KV cache by ~93%):
#   Effective KV cache is dramatically smaller than standard MHA models.
#   This is why DeepSeek models are practical for long context despite
#   their huge parameter counts.
# =============================================================================

kv_cache_estimates:
  llama_3_1_8B:
    layers: 32
    kv_heads: 8
    head_dim: 128
    bytes_per_token_fp16: 131072  # 0.125 MB
    at_4k_context_gb: 0.49
    at_32k_context_gb: 3.91
    at_131k_context_gb: 16.00

  llama_3_1_70B:
    layers: 80
    kv_heads: 8
    head_dim: 128
    bytes_per_token_fp16: 327680  # 0.3125 MB
    at_4k_context_gb: 1.22
    at_32k_context_gb: 9.77
    at_131k_context_gb: 40.04

  llama_3_1_405B:
    layers: 126
    kv_heads: 8
    head_dim: 128
    bytes_per_token_fp16: 516096  # 0.492 MB
    at_4k_context_gb: 1.92
    at_32k_context_gb: 15.38
    at_131k_context_gb: 63.12

# =============================================================================
# SECTION 7: Practical Deployment Recommendations for 4xH100 80GB
# =============================================================================

practical_recommendations:
  best_value_models:
    - model: "Llama 3.1 8B / Llama 3.2 3B"
      precision: "BF16"
      tp: 1
      rationale: >
        Run up to 4 independent model instances (one per GPU) for maximum
        throughput. Ideal for high-volume, lower-complexity tasks.

    - model: "Qwen 2.5 32B"
      precision: "BF16"
      tp: 2
      rationale: >
        Run 2 independent instances (TP=2 each, using GPU pairs). Strong
        quality-to-cost ratio. Excellent for code and multilingual tasks.

    - model: "Llama 3.1/3.3 70B"
      precision: "BF16"
      tp: 4
      rationale: >
        Single instance across all 4 GPUs. Highest quality dense model
        that fits at BF16. Best for complex reasoning and generation.

    - model: "Llama 3.1 405B"
      precision: "INT4 (AWQ)"
      tp: 4
      rationale: >
        Maximum model size that fits on 4xH100. Quality trade-off from
        INT4 quantization. Consider if 70B at BF16 is insufficient.

  maximum_throughput_config:
    description: >
      For maximum tokens/second, run 4 independent small model instances
      (one per GPU). Example: 4x Llama 3.1 8B at BF16.
    estimated_throughput: "4x ~2000-4000 tokens/sec = 8000-16000 total tokens/sec"

  maximum_quality_config:
    description: >
      For maximum quality, run Llama 3.1 405B at INT4 with TP=4, or
