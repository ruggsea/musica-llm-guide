        raw_gb: 72.71   # 72.71 * 1
        with_overhead_gb: 83.62   # 72.71 * 1.15
      INT4:
        raw_gb: 36.36   # 72.71 * 0.5
        with_overhead_gb: 41.81   # 36.36 * 1.15
    fits_on_4xH100:
      FP32: false  # 334.47 GB > 320 GB
