# Kimi K2 -- 4-node DP+EP
# 1032B MoE (32B active), FP8
# PP is BROKEN for DeepSeekV3 arch in vLLM 0.15.1 -> must use DP+EP
# Needs blobfile package
# Memory: ~1032 GB FP8, DP+EP across 16 GPUs -> ~73.5 GB/GPU
MODEL_ID="moonshotai/Kimi-K2-Instruct"
SERVED_NAME="kimi-k2"
MODE="dpep"
NODES=4
TP=4
DP_SIZE=16
DP_LOCAL=4
DTYPE="auto"
MAX_MODEL_LEN=4096
MAX_NUM_SEQS=16
MAX_NUM_BATCHED_TOKENS=4096
GPU_MEMORY_UTIL=0.90
EXTRA_ARGS="--trust-remote-code"
TRUST_REMOTE_CODE=true
NEEDS_DEEPGEMM=false
