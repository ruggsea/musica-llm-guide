# GLM-5 FP8 -- 3-node DP+EP
# 754B MoE, FP8 native, MIT (Zhipu AI)
# ~754 GB FP8 -> 3 nodes (12 GPUs) = ~63 GB/GPU
# Architecture: glm_moe_dsa -- needs vLLM 0.17.0+
# VENV: /data/fs201045/rl41113/vllm-017-venv (NOT the default venv!)
MODEL_ID="zai-org/GLM-5-FP8"
SERVED_NAME="glm5-fp8"
MODE="dpep"
NODES=3
TP=4
DP_SIZE=12
DP_LOCAL=4
DTYPE="auto"
MAX_MODEL_LEN=4096
MAX_NUM_SEQS=16
MAX_NUM_BATCHED_TOKENS=4096
GPU_MEMORY_UTIL=0.95
EXTRA_ARGS="--enforce-eager"
TRUST_REMOTE_CODE=true
NEEDS_DEEPGEMM=false
VENV="/data/fs201045/rl41113/vllm-017-venv"
