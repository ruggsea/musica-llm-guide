# Mistral-Large-3 -- 3-node DP+EP
# 675B MoE (41B active), ships as compressed-tensors (~FP8)
# PP is BROKEN for PixtralForConditionalGeneration in vLLM 0.15.1
# Needs DeepGEMM for compressed-tensors FP8 kernel JIT
# Needs pre-compiled FlashInfer CUTLASS MoE kernels
# CRITICAL: requires --tokenizer-mode mistral --config-format mistral --load-format mistral
# Memory: ~675 GB FP8, DP+EP across 12 GPUs -> ~63 GB/GPU
MODEL_ID="mistralai/Mistral-Large-3-675B-Instruct-2512"
SERVED_NAME="mistral-large-3"
MODE="dpep"
NODES=3
TP=4
DP_SIZE=12
DP_LOCAL=4
DTYPE="auto"
MAX_MODEL_LEN=4096
MAX_NUM_SEQS=16
MAX_NUM_BATCHED_TOKENS=4096
GPU_MEMORY_UTIL=0.95
EXTRA_ARGS="--tokenizer-mode mistral --config-format mistral --load-format mistral"
TRUST_REMOTE_CODE=false
NEEDS_DEEPGEMM=true
