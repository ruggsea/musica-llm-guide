# Kimi K2.5 -- 4-node DP+EP
# 1058B MoE multimodal, compressed-tensors FP8
# Same architecture family as K2 but multimodal (kimi_k25)
# Needs blobfile package, --trust-remote-code
# Memory: ~960 GB FP8, DP+EP across 16 GPUs -> ~60 GB/GPU
MODEL_ID="moonshotai/Kimi-K2.5"
SERVED_NAME="kimi-k25"
MODE="dpep"
NODES=4
TP=4
DP_SIZE=16
DP_LOCAL=4
DTYPE="auto"
MAX_MODEL_LEN=4096
MAX_NUM_SEQS=16
MAX_NUM_BATCHED_TOKENS=4096
GPU_MEMORY_UTIL=0.90
EXTRA_ARGS="--trust-remote-code"
TRUST_REMOTE_CODE=true
NEEDS_DEEPGEMM=false
