# GLM-4.7-FP8 -- 2-node DP+EP
# 358B MoE, FP8 native, MIT (Zhipu AI)
# ~358 GB FP8 -> 2 nodes (8 GPUs) = ~45 GB/GPU
# Architecture: glm4_moe_lite -- needs vLLM 0.17.0+ (or transformers 5.3.0)
# VENV: /data/fs201045/rl41113/vllm-017-venv (NOT the default venv!)
MODEL_ID="zai-org/GLM-4.7-FP8"
SERVED_NAME="glm47-fp8"
MODE="dpep"
NODES=2
TP=4
DP_SIZE=8
DP_LOCAL=4
DTYPE="auto"
MAX_MODEL_LEN=4096
MAX_NUM_SEQS=16
MAX_NUM_BATCHED_TOKENS=4096
GPU_MEMORY_UTIL=0.90
EXTRA_ARGS="--enforce-eager"
TRUST_REMOTE_CODE=true
NEEDS_DEEPGEMM=false
VENV="/data/fs201045/rl41113/vllm-017-venv"
