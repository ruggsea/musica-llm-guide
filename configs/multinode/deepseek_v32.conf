# DeepSeek-V3.2 -- 3-node DP+EP
# 671B MoE (37B active), ships FP8 (DeepseekV32ForCausalLM)
# PP is BROKEN for this arch in vLLM 0.15.1 -> must use DP+EP
# Needs DeepGEMM for compressed-tensors FP8 kernel JIT
# Needs pre-compiled FlashInfer CUTLASS MoE kernels
# Memory: ~671 GB FP8, DP+EP across 12 GPUs -> ~56 GB/GPU
MODEL_ID="deepseek-ai/DeepSeek-V3.2"
SERVED_NAME="deepseek-v32"
MODE="dpep"
NODES=3
TP=4
DP_SIZE=12
DP_LOCAL=4
DTYPE="auto"
MAX_MODEL_LEN=4096
MAX_NUM_SEQS=16
MAX_NUM_BATCHED_TOKENS=4096
GPU_MEMORY_UTIL=0.90
EXTRA_ARGS=""
TRUST_REMOTE_CODE=false
NEEDS_DEEPGEMM=true
