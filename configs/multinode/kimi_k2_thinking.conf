# Kimi K2 Thinking -- 4-node DP+EP
# 1T MoE (32B active), ships native INT4 (QAT compressed-tensors)
# PP is BROKEN for DeepSeekV3 arch in vLLM 0.15.1 -> must use DP+EP
# INT4 QAT reduces memory by ~2x vs FP8: ~1032 * 0.5 * 1.15 = 594 GB -> 16 GPUs = 37 GB/GPU
# Arena ELO 1430 (#34) -- highest ranked open thinking model
MODEL_ID="moonshotai/Kimi-K2-Thinking"
SERVED_NAME="kimi-k2-thinking"
MODE="dpep"
NODES=4
TP=4
DP_SIZE=16
DP_LOCAL=4
DTYPE="auto"
MAX_MODEL_LEN=4096
MAX_NUM_SEQS=16
MAX_NUM_BATCHED_TOKENS=4096
GPU_MEMORY_UTIL=0.90
EXTRA_ARGS="--trust-remote-code"
TRUST_REMOTE_CODE=true
NEEDS_DEEPGEMM=false
