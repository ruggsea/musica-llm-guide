# Step-3.5-Flash FP8 -- 2-node DP+EP
# 199B MoE (11B active), ships FP8, Apache 2.0 (StepFun)
# TP=4 FAILS: FP8 block_n=128, gate/up=320 not divisible
# TP=2 OOM: ~100 GB/GPU > 94 GB H100
# Solution: 2-node DP+EP (8 GPUs total, ~25 GB/GPU)
# Needs --trust-remote-code (custom step3p5 architecture)
MODEL_ID="stepfun-ai/Step-3.5-Flash-FP8"
SERVED_NAME="step35-flash-fp8"
MODE="dpep"
NODES=2
TP=4
DP_SIZE=8
DP_LOCAL=4
DTYPE="auto"
MAX_MODEL_LEN=4096
MAX_NUM_SEQS=16
MAX_NUM_BATCHED_TOKENS=4096
GPU_MEMORY_UTIL=0.90
EXTRA_ARGS="--trust-remote-code"
TRUST_REMOTE_CODE=true
NEEDS_DEEPGEMM=false
