# DeepSeek-V3.1 -- 3-node DP+EP
# 685B MoE (37B active), ships FP8, MIT license
# PP mode now broken after transformers 5.3.0 upgrade (KeyError on self_attn.attn)
# Switched to DP+EP like V3.2 and Kimi K2
# Needs DeepGEMM for FP8 kernel JIT
# Needs pre-compiled FlashInfer CUTLASS MoE kernels
# Memory: ~685 GB FP8, DP+EP across 12 GPUs -> ~57 GB/GPU
MODEL_ID="deepseek-ai/DeepSeek-V3.1"
SERVED_NAME="deepseek-v31"
MODE="dpep"
NODES=3
TP=4
DP_SIZE=12
DP_LOCAL=4
DTYPE="auto"
MAX_MODEL_LEN=4096
MAX_NUM_SEQS=16
MAX_NUM_BATCHED_TOKENS=4096
GPU_MEMORY_UTIL=0.90
EXTRA_ARGS=""
TRUST_REMOTE_CODE=false
NEEDS_DEEPGEMM=true
