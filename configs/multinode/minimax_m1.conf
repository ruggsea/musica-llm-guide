# MiniMax-M1-80k -- 2-node DP+EP
# ~456B total params (MoE), ships BF16, ~90 GB/GPU on 4 GPUs -> OOM
# PP not supported (no SupportsPP), TP=8 times out (cross-node NCCL)
# Following MiniMax-M2 recipe: use DP+EP mode
# vLLM recipe: https://docs.vllm.ai/projects/recipes/en/latest/MiniMax/MiniMax-M2.html
MODEL_ID="MiniMaxAI/MiniMax-M1-80k"
SERVED_NAME="minimax-m1-80k"
MODE="dpep"
NODES=2
TP=4
DP_SIZE=8
DP_LOCAL=4
DTYPE="bfloat16"
MAX_MODEL_LEN=4096
MAX_NUM_SEQS=16
MAX_NUM_BATCHED_TOKENS=4096
GPU_MEMORY_UTIL=0.90
EXTRA_ARGS=""
TRUST_REMOTE_CODE=true
NEEDS_DEEPGEMM=false
